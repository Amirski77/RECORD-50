{% extends "layout.html" %}

{% block content %}
    <h2>Profile links</h2>
    <form action="/settings" method="post" class="settings-form">
        <label>Apple Music profile URL</label>
        <input type="url" name="apple_music_profile" placeholder="https://music.apple.com/profile/..."
               value="{{ user.apple_music_profile or '' }}">

        <label>Spotify profile URL</label>
        <input type="url" name="spotify_profile" placeholder="https://open.spotify.com/user/..."
               value="{{ user.spotify_profile or '' }}">

        <button type="submit">Save</button>
    </form>
{% endblock %}
